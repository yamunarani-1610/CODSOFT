<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forge — Project Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --bg4: #22222f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f8;
    --text2: #a0a0b8;
    --text3: #606078;
    --accent: #6c63ff;
    --accent2: #8b85ff;
    --accent-soft: rgba(108,99,255,0.15);
    --green: #22d3a0;
    --green-soft: rgba(34,211,160,0.12);
    --amber: #f5a623;
    --amber-soft: rgba(245,166,35,0.12);
    --red: #ff5e7d;
    --red-soft: rgba(255,94,125,0.12);
    --blue: #38bdf8;
    --blue-soft: rgba(56,189,248,0.12);
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
    overflow-x: hidden;
  }
  #root { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    min-height: 100vh;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 100;
  }
  .sidebar-logo {
    padding: 24px 20px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 16px; color: #fff;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 18px; color: var(--text);
    letter-spacing: -0.5px;
  }
  .sidebar-nav { padding: 16px 12px; flex: 1; }
  .nav-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
    color: var(--text3); text-transform: uppercase;
    padding: 0 8px; margin-bottom: 8px; margin-top: 16px;
  }
  .nav-label:first-child { margin-top: 0; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: var(--radius-sm);
    cursor: pointer; color: var(--text2); font-size: 13.5px;
    transition: all 0.15s; position: relative;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent2); }
  .nav-item .nav-icon { width: 16px; text-align: center; flex-shrink: 0; }
  .nav-badge {
    margin-left: auto; background: var(--accent);
    color: #fff; font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center;
  }
  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid var(--border);
  }
  .user-card {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius-sm);
    cursor: pointer;
  }
  .user-card:hover { background: var(--bg3); }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 12px; color: #fff; flex-shrink: 0;
  }
  .user-info .user-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .user-info .user-role { font-size: 11px; color: var(--text3); }

  /* MAIN */
  .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar {
    padding: 0 32px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 700; color: var(--text);
  }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.15s; border: none; font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-secondary {
    background: var(--bg3); color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--bg4); color: var(--text); }
  .btn-ghost { background: none; color: var(--text2); }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }
  .btn-danger { background: var(--red-soft); color: var(--red); border: 1px solid rgba(255,94,125,0.2); }
  .btn-danger:hover { background: rgba(255,94,125,0.25); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon {
    width: 34px; height: 34px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer; color: var(--text2);
    transition: all 0.15s;
  }
  .btn-icon:hover { background: var(--bg4); color: var(--text); }

  /* CONTENT */
  .content { padding: 32px; flex: 1; }

  /* CARDS */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-hover { transition: all 0.2s; cursor: pointer; }
  .card-hover:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  /* STATS ROW */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { padding: 20px 22px; }
  .stat-icon {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; margin-bottom: 14px;
  }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--text3); font-weight: 500; letter-spacing: 0.3px; }
  .stat-delta { font-size: 11px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
  .delta-up { color: var(--green); }
  .delta-down { color: var(--red); }

  /* SECTION HEADER */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; color: var(--text);
  }

  /* PROJECTS GRID */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .project-card { padding: 20px; }
  .project-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
  .project-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    flex-shrink: 0;
  }
  .project-status-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase; padding: 3px 8px; border-radius: 6px;
  }
  .status-active { background: var(--green-soft); color: var(--green); }
  .status-planning { background: var(--blue-soft); color: var(--blue); }
  .status-review { background: var(--amber-soft); color: var(--amber); }
  .status-done { background: var(--bg3); color: var(--text3); }
  .status-onhold { background: var(--red-soft); color: var(--red); }
  .project-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; color: var(--text);
    margin-bottom: 5px; line-height: 1.3;
  }
  .project-desc { font-size: 12.5px; color: var(--text3); line-height: 1.5; margin-bottom: 14px; }
  .project-meta { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .meta-item svg { opacity: 0.5; }
  .progress-bar { background: var(--bg4); border-radius: 4px; height: 5px; overflow: hidden; margin-bottom: 14px; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .project-footer { display: flex; align-items: center; justify-content: space-between; }
  .team-avatars { display: flex; }
  .team-avatar {
    width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--bg2);
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; color: #fff;
    margin-left: -6px;
  }
  .team-avatar:first-child { margin-left: 0; }
  .deadline-label { font-size: 11px; color: var(--text3); }
  .deadline-label.overdue { color: var(--red); }

  /* TASKS */
  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: var(--radius-sm);
    background: var(--bg3); border: 1px solid transparent;
    transition: all 0.15s; cursor: pointer;
  }
  .task-item:hover { border-color: var(--border); background: var(--bg4); }
  .task-check {
    width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0;
    border: 1.5px solid var(--border2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .task-check.done { background: var(--green); border-color: var(--green); }
  .task-name { flex: 1; font-size: 13.5px; color: var(--text); }
  .task-name.done { text-decoration: line-through; color: var(--text3); }
  .task-priority {
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase; padding: 2px 7px; border-radius: 5px;
  }
  .priority-high { background: var(--red-soft); color: var(--red); }
  .priority-medium { background: var(--amber-soft); color: var(--amber); }
  .priority-low { background: var(--green-soft); color: var(--green); }
  .task-assignee { font-size: 11px; color: var(--text3); }
  .task-due { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .task-due.overdue { color: var(--red); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 28px;
    width: 100%; max-width: 520px;
    animation: slideUp 0.2s ease;
    max-height: 90vh; overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 20px; padding: 4px; }
  .modal-close:hover { color: var(--text); }
  .form-group { margin-bottom: 18px; }
  .form-label { font-size: 12px; font-weight: 600; letter-spacing: 0.3px; color: var(--text2); margin-bottom: 7px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px;
    color: var(--text); font-size: 13.5px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .form-select { appearance: none; cursor: pointer; }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
  .color-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .color-dot {
    width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent; transition: all 0.15s;
  }
  .color-dot.selected { border-color: #fff; transform: scale(1.1); }
  .emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .emoji-btn {
    width: 36px; height: 36px; border-radius: 8px; background: var(--bg3);
    border: 1px solid var(--border); cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .emoji-btn:hover, .emoji-btn.selected { background: var(--accent-soft); border-color: var(--accent); }

  /* KANBAN */
  .kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; }
  .kanban-col {
    min-width: 280px; max-width: 280px; background: var(--bg2);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; display: flex; flex-direction: column; gap: 10px;
  }
  .kanban-col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .kanban-col-title { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .kanban-count {
    font-size: 11px; background: var(--bg3); color: var(--text3);
    padding: 2px 7px; border-radius: 10px; font-weight: 600;
  }
  .kanban-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px;
    cursor: pointer; transition: all 0.15s;
  }
  .kanban-card:hover { border-color: var(--border2); background: var(--bg4); transform: translateY(-1px); }
  .kanban-card-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
  .kanban-card-meta { display: flex; align-items: center; justify-content: space-between; }
  .kanban-tag {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.4px;
  }

  /* TABS */
  .tabs { display: flex; gap: 2px; background: var(--bg3); padding: 4px; border-radius: var(--radius-sm); margin-bottom: 24px; }
  .tab {
    padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; color: var(--text2); transition: all 0.15s;
    background: none; border: none; font-family: inherit;
  }
  .tab.active { background: var(--bg); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

  /* SEARCH */
  .search-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 12px;
    min-width: 240px;
  }
  .search-bar input {
    background: none; border: none; outline: none; color: var(--text);
    font-size: 13px; font-family: inherit; flex: 1; min-width: 0;
  }
  .search-bar input::placeholder { color: var(--text3); }

  /* CHART */
  .chart-bar-group { display: flex; align-items: flex-end; gap: 6px; height: 100px; }
  .chart-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .chart-bar {
    width: 100%; border-radius: 4px 4px 0 0;
    background: var(--accent);
    transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .chart-label { font-size: 10px; color: var(--text3); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .empty-desc { font-size: 13px; color: var(--text3); }

  /* TOAST */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    min-width: 260px; box-shadow: var(--shadow);
    animation: slideInRight 0.3s ease;
  }
  @keyframes slideInRight { from { transform: translateX(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .toast-icon { font-size: 16px; }
  .toast-msg { font-size: 13px; color: var(--text); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border2); }

  /* DETAIL PANEL */
  .detail-panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 420px;
    background: var(--bg2); border-left: 1px solid var(--border);
    z-index: 150; padding: 28px;
    overflow-y: auto;
    animation: slideFromRight 0.25s ease;
  }
  @keyframes slideFromRight { from { transform: translateX(420px); } to { transform: translateX(0); } }
  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
  .activity-list { display: flex; flex-direction: column; gap: 0; }
  .activity-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .activity-item:last-child { border-bottom: none; }
  .activity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
  .activity-content .activity-text { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .activity-content .activity-time { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ── helpers ── */
const uid = () => Math.random().toString(36).slice(2, 9);
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = d => { if (!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const isOverdue = d => d && new Date(d) < new Date();
const diffDays = d => { if (!d) return null; return Math.ceil((new Date(d)-new Date())/86400000); };

const PROJECT_COLORS = ['#6c63ff','#22d3a0','#f5a623','#ff5e7d','#38bdf8','#a78bfa','#f472b6','#34d399'];
const PROJECT_EMOJIS = ['🚀','💡','🎯','🛠️','📊','🌿','🔥','💎','⚡','🎨','📱','🌐','🔬','🏗️','✨','🎮'];
const PRIORITIES = ['Low','Medium','High'];
const STATUSES = ['Planning','Active','Review','Done','On Hold'];
const MEMBERS = ['Alex K','Maya P','Jordan R','Sam T','Chris L','Dana M'];

/* ── initial data ── */
const INIT_PROJECTS = [
  { id: uid(), name: 'Website Redesign', desc: 'Full overhaul of marketing site with new brand identity and improved UX', color: '#6c63ff', emoji: '🎨', status: 'Active', deadline: '2025-04-30', members: ['Alex K','Maya P','Sam T'], progress: 65, createdAt: '2025-01-10' },
  { id: uid(), name: 'Mobile App v2', desc: 'Next-gen mobile experience with offline support and real-time sync', color: '#22d3a0', emoji: '📱', status: 'Review', deadline: '2025-03-15', members: ['Jordan R','Chris L'], progress: 88, createdAt: '2024-12-01' },
  { id: uid(), name: 'Data Pipeline', desc: 'Automated ETL pipeline for analytics dashboards and reporting', color: '#f5a623', emoji: '📊', status: 'Planning', deadline: '2025-06-01', members: ['Dana M','Alex K'], progress: 20, createdAt: '2025-02-01' },
  { id: uid(), name: 'API Platform', desc: 'Developer-first REST API with docs, SDK, and sandbox environment', color: '#38bdf8', emoji: '🌐', status: 'Active', deadline: '2025-05-20', members: ['Sam T','Maya P','Jordan R'], progress: 42, createdAt: '2025-01-20' },

/* ── Toast ── */
function Toast({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div className="toast" key={t.id}>
          <span className="toast-icon">{t.icon}</span>

    </div>
  );
}

/* ── ProjectModal ── */
function ProjectModal({ onClose, onSave, initial }) {
  const [form, setForm] = useState(initial || { name:'', desc:'', color: PROJECT_COLORS[0], emoji: PROJECT_EMOJIS[0], status:'Planning', deadline:'', members:[] });
  const set = k => e => setForm(f => ({...f, [k]: e.target.value}));
  const toggleMember = m => setForm(f => ({...f, members: f.members.includes(m) ? f.members.filter(x=>x!==m) : [...f.members, m]}));
  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">{initial ? 'Edit Project' : '+ New Project'}</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="form-group">
          <label className="form-label">Project Name</label>
          <input className="form-input" value={form.name} onChange={set('name')} placeholder="e.g. Website Redesign" />
        </div>
        <div className="form-group">
          <label className="form-label">Description</label>
          <textarea className="form-textarea" value={form.desc} onChange={set('desc')} placeholder="What is this project about?" />
        </div>
        <div className="form-row">
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Status</label>
            <select className="form-select" value={form.status} onChange={set('status')} style={{background:'var(--bg3)',color:'var(--text)'}}>
              {STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Deadline</label>
            <input className="form-input" type="date" value={form.deadline} onChange={set('deadline')} style={{colorScheme:'dark'}} />
          </div>
        </div>
        <div className="form-group" style={{marginTop:18}}>
          <label className="form-label">Color</label>
          <div className="color-grid">
            {PROJECT_COLORS.map(c=>(
              <div key={c} className={`color-dot ${form.color===c?'selected':''}`} style={{background:c}} onClick={()=>setForm(f=>({...f,color:c}))} />
            ))}
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Icon</label>
          <div className="emoji-grid">
            {PROJECT_EMOJIS.map(e=>(
              <button key={e} className={`emoji-btn ${form.emoji===e?'selected':''}`} onClick={()=>setForm(f=>({...f,emoji:e}))}>{e}</button>
            ))}
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Team Members</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {MEMBERS.map(m=>(
              <button key={m} onClick={()=>toggleMember(m)} style={{
                padding:'5px 12px', borderRadius:'var(--radius-sm)', fontSize:12, fontWeight:500, fontFamily:'inherit',
                cursor:'pointer', transition:'all 0.15s',
                background: form.members.includes(m) ? 'var(--accent-soft)' : 'var(--bg3)',
                color: form.members.includes(m) ? 'var(--accent2)' : 'var(--text2)',
                border: `1px solid ${form.members.includes(m) ? 'var(--accent)' : 'var(--border)'}`,
              }}>{m}</button>
            ))}
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={()=>form.name.trim()&&onSave(form)}>
            {initial ? 'Save Changes' : 'Create Project'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Dashboard Page ── */
function DashboardPage({ projects, tasks, addToast }) {
  const totalTasks = tasks.length;
  const doneTasks = tasks.filter(t=>t.done).length;
  const overdueTasks = tasks.filter(t=>!t.done&&isOverdue(t.due)).length;
  const activeProj = projects.filter(p=>p.status==='Active').length;
  const chartData = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d,i)=>({label:d,val:Math.floor(Math.random()*8+2)}));
  const recentTasks = [...tasks].sort((a,b)=>new Date(b.due||0)-new Date(a.due||0)).slice(0,5);
  return (
    <div>
      <div className="stats-grid">
        <div className="card stat-card">
          <div className="stat-icon" style={{background:'var(--accent-soft)',color:'var(--accent)'}}>📁</div>
          <div className="stat-value" style={{color:'var(--accent)'}}>{projects.length}</div>
          <div className="stat-label">Total Projects</div>
          <div className="stat-delta delta-up">↑ {activeProj} active</div>
        </div>
        <div className="card stat-card">
          <div className="stat-icon" style={{background:'var(--blue-soft)',color:'var(--blue)'}}>✅</div>
          <div className="stat-value" style={{color:'var(--blue)'}}>{totalTasks}</div>
          <div className="stat-label">Total Tasks</div>
          <div className="stat-delta delta-up">↑ {doneTasks} completed</div>
        </div>
        <div className="card stat-card">
          <div className="stat-icon" style={{background:'var(--green-soft)',color:'var(--green)'}}>📈</div>
          <div className="stat-value" style={{color:'var(--green)'}}>{totalTasks>0?Math.round(doneTasks/totalTasks*100):0}%</div>
          <div className="stat-label">Completion Rate</div>
          <div className="stat-delta delta-up">↑ on track</div>
        </div>
        <div className="card stat-card">
          <div className="stat-icon" style={{background:'var(--red-soft)',color:'var(--red)'}}>⚠️</div>
          <div className="stat-value" style={{color: overdueTasks>0?'var(--red)':'var(--green)'}}>{overdueTasks}</div>
          <div className="stat-label">Overdue Tasks</div>
          <div className={`stat-delta ${overdueTasks>0?'delta-down':'delta-up'}`}>{overdueTasks>0?'⚠ needs attention':'✓ all on time'}</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
        <div className="card">
          <div className="section-header" style={{marginBottom:20}}>
            <span className="section-title">Weekly Activity</span>
            <span style={{fontSize:11,color:'var(--text3)'}}>Tasks completed</span>
          </div>
          <div className="chart-bar-group">
            {chartData.map(d=>(
              <div className="chart-bar-wrap" key={d.label}>
                <div className="chart-bar" style={{height:`${d.val*10}px`,opacity:0.7+d.val/30}}/>
                <span className="chart-label">{d.label}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="section-header" style={{marginBottom:16}}>
            <span className="section-title">Project Progress</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {projects.slice(0,4).map(p=>(
              <div key={p.id}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                  <span style={{fontSize:12,fontWeight:500,color:'var(--text)'}}>{p.emoji} {p.name}</span>
                  <span style={{fontSize:12,color:'var(--text3)'}}>{p.progress}%</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width:`${p.progress}%`,background:p.color}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="section-header">
        <span className="section-title">Recent Tasks</span>
      </div>
      <div className="card">
        <div className="task-list">
          {recentTasks.map(t=>{
            const proj = projects.find(p=>p.id===t.projectId);
            return (
              <div className="task-item" key={t.id}>
                <div className={`task-check ${t.done?'done':''}`}>
                  {t.done && <Icon name="check" size={10} />}
                </div>
                <span className={`task-name ${t.done?'done':''}`}>{t.title}</span>
                {proj && <span style={{fontSize:11,color:proj.color,background:proj.color+'22',padding:'2px 7px',borderRadius:4,fontWeight:600}}>{proj.emoji} {proj.name}</span>}
                <span className={`task-priority priority-${t.priority.toLowerCase()}`}>{t.priority}</span>
                <span className={`task-due ${isOverdue(t.due)&&!t.done?'overdue':''}`}>{fmtDate(t.due)}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ── Projects Page ── */
function ProjectsPage({ projects, tasks, onAddProject, onEditProject, onDeleteProject, addToast }) {
  const [showModal, setShowModal] = useState(false);
  const [editProj, setEditProj] = useState(null);
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('All');

  const filtered = projects.filter(p =>
    (filterStatus==='All'||p.status===filterStatus) &&
    (p.name.toLowerCase().includes(search.toLowerCase()) || p.desc.toLowerCase().includes(search.toLowerCase()))
  );

  const handleSave = form => {
    if (editProj) { onEditProject({...editProj,...form}); addToast('✏️','Project updated'); }
    else { onAddProject({...form, id:uid(), progress:0, createdAt:today()}); addToast('🚀','Project created!'); }
    setShowModal(false); setEditProj(null);
  };

  return (
    <div>
      <div style={{display:'flex',gap:10,marginBottom:24,flexWrap:'wrap',alignItems:'center'}}>
        <div className="search-bar" style={{flex:1,minWidth:200}}>
          <Icon name="search" size={14} />
          <input placeholder="Search projects…" value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
        <div style={{display:'flex',gap:6}}>
          {['All',...STATUSES].map(s=>(
            <button key={s} className={`btn btn-sm ${filterStatus===s?'btn-primary':'btn-secondary'}`} onClick={()=>setFilterStatus(s)}>{s}</button>
          ))}
        </div>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>
          <Icon name="plus" size={13} /> New Project
        </button>
      </div>
      {filtered.length===0 ? (
        <div className="empty-state">
          <div className="empty-icon">📁</div>
          <div className="empty-title">No projects found</div>
          <div className="empty-desc">Create a new project to get started</div>
        </div>
      ) : (
        <div className="projects-grid">
          {filtered.map(p => {
            const ptasks = tasks.filter(t=>t.projectId===p.id);
            const pdone = ptasks.filter(t=>t.done).length;
            const days = diffDays(p.deadline);
            return (
              <div className="card project-card card-hover" key={p.id} style={{borderTop:`3px solid ${p.color}`}}>
                <div className="project-top">
                  <div className="project-icon" style={{background:p.color+'22'}}>{p.emoji}</div>
                  <div style={{display:'flex',gap:6}}>
                    <span className={`project-status-badge status-${p.status.toLowerCase().replace(' ','-')}`}>{p.status}</span>
                  </div>
                </div>
                <div className="project-name">{p.name}</div>
                <div className="project-desc">{p.desc}</div>
                <div className="project-meta">
                  <span className="meta-item"><Icon name="tasks" size={12} />{ptasks.length} tasks</span>
                  <span className="meta-item"><Icon name="team" size={12} />{p.members.length} members</span>
                  {p.deadline && <span className={`meta-item ${days!==null&&days<0?'overdue':''}`} style={days!==null&&days<0?{color:'var(--red)'}:{}}><Icon name="cal" size={12} />{days!==null&&days<0?'Overdue':days===0?'Due today':`${days}d left`}</span>}
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width:`${p.progress}%`,background:p.color}} />
                </div>
                <div className="project-footer">
                  <div className="team-avatars">
                    {p.members.slice(0,4).map((m,i)=>(
                      <div className="team-avatar" key={i} title={m}>{m.split(' ').map(x=>x[0]).join('')}</div>
                    ))}
                    {p.members.length>4 && <div className="team-avatar" style={{background:'var(--bg4)',color:'var(--text3)'}}>+{p.members.length-4}</div>}
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn-icon" onClick={e=>{e.stopPropagation();setEditProj(p);setShowModal(true);}}>
                      <Icon name="edit" size={13} />
                    </button>
                    <button className="btn-icon" onClick={e=>{e.stopPropagation();onDeleteProject(p.id);addToast('🗑️','Project deleted');}} style={{color:'var(--red)'}}>
                      <Icon name="trash" size={13} />
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {showModal && <ProjectModal onClose={()=>{setShowModal(false);setEditProj(null);}} onSave={handleSave} initial={editProj} />}
    </div>
  );
}

    (filterPriority==='All'||t.priority===filterPriority) &&
    (filterProject==='All'||t.projectId===filterProject) &&
    t.title.toLowerCase().includes(search.toLowerCase())
  );

  const handleSave = form => {
    if(editTask){onEditTask({...editTask,...form,done:form.status==='Done'});addToast('✏️','Task updated');}
    else{onAddTask({...form,id:uid(),done:form.status==='Done'});addToast('✅','Task created!');}
    setShowModal(false);setEditTask(null);
  };

  const KANBAN_COLS = ['To Do','In Progress','In Review','Done'];
  const colColor = { 'To Do':'var(--text3)', 'In Progress':'var(--blue)', 'In Review':'var(--amber)', 'Done':'var(--green)' };

  return (
    <div>
      <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
        <div className="search-bar" style={{flex:1,minWidth:200}}>
          <Icon name="search" size={14} />
          <input placeholder="Search tasks…" value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
        <select className="form-select" value={filterProject} onChange={e=>setFilterProject(e.target.value)} style={{background:'var(--bg3)',color:'var(--text)',width:160,padding:'8px 12px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',fontFamily:'inherit',fontSize:13}}>
          <option value="All">All Projects</option>
          {projects.map(p=><option key={p.id} value={p.id}>{p.emoji} {p.name}</option>)}
        </select>
        {['All',...PRIORITIES].map(p=>(
          <button key={p} className={`btn btn-sm ${filterPriority===p?'btn-primary':'btn-secondary'}`} onClick={()=>setFilterPriority(p)}>{p}</button>
        ))}
        <div className="tabs" style={{marginBottom:0}}>
          <button className={`tab ${view==='list'?'active':''}`} onClick={()=>setView('list')}>List</button>
          <button className={`tab ${view==='kanban'?'active':''}`} onClick={()=>setView('kanban')}>Board</button>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>
          <Icon name="plus" size={13} /> New Task
        </button>
      </div>
      {view==='list' ? (
        <div className="card">
          {filtered.length===0 ? (
            <div className="empty-state"><div className="empty-icon">✅</div><div className="empty-title">No tasks found</div><div className="empty-desc">Create a task to get started</div></div>
          ) : (
            <div className="task-list">
              {filtered.map(t=>{
                const proj = projects.find(p=>p.id===t.projectId);
                return (
                  <div className="task-item" key={t.id}>
                    <div className={`task-check ${t.done?'done':''}`} onClick={()=>{onToggleTask(t.id);addToast(t.done?'○':'✅',t.done?'Task reopened':'Task done!');}}>
                      {t.done&&<Icon name="check" size={10}/>}
                    </div>
                    <span className={`task-name ${t.done?'done':''}`}>{t.title}</span>
                    {proj&&<span style={{fontSize:11,color:proj.color,background:proj.color+'22',padding:'2px 7px',borderRadius:4,fontWeight:600,flexShrink:0}}>{proj.emoji}</span>}
                    <span className={`task-priority priority-${t.priority.toLowerCase()}`}>{t.priority}</span>
                    {t.assignee&&<span className="task-assignee">{t.assignee}</span>}
                    <span className={`task-due ${isOverdue(t.due)&&!t.done?'overdue':''}`}>{fmtDate(t.due)}</span>
                    <button className="btn-icon" style={{width:28,height:28}} onClick={()=>{setEditTask(t);setShowModal(true);}}>
                      <Icon name="edit" size={12}/>
                    </button>
                    <button className="btn-icon" style={{width:28,height:28,color:'var(--red)'}} onClick={()=>{onDeleteTask(t.id);addToast('🗑️','Task deleted');}}>
                      <Icon name="trash" size={12}/>
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      ) : (
        <div className="kanban-board">
          {KANBAN_COLS.map(col=>{
            const colTasks = filtered.filter(t=>t.status===col||(col==='Done'&&t.done&&t.status!=='To Do'&&t.status!=='In Progress'&&t.status!=='In Review'));
            const uniqueTasks = filtered.filter(t=>(t.status===col));
            return (
              <div className="kanban-col" key={col}>
                <div className="kanban-col-header">
                  <span className="kanban-col-title" style={{color:colColor[col]}}>{col}</span>
                  <span className="kanban-count">{uniqueTasks.length}</span>
                </div>
                {uniqueTasks.map(t=>{
                  const proj=projects.find(p=>p.id===t.projectId);
                  return (
                    <div className="kanban-card" key={t.id} onClick={()=>{setEditTask(t);setShowModal(true);}}>
                      <div className="kanban-card-title">{t.title}</div>
                      <div className="kanban-card-meta">
                        <span className={`kanban-tag task-priority priority-${t.priority.toLowerCase()}`}>{t.priority}</span>
                        {proj&&<span style={{fontSize:11,color:proj.color}}>{proj.emoji} {proj.name}</span>}
                      </div>
                      {t.assignee&&<div style={{marginTop:8,fontSize:11,color:'var(--text3)',display:'flex',alignItems:'center',gap:5}}>
                        <div style={{width:16,height:16,borderRadius:'50%',background:'var(--accent-soft)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'var(--accent)',fontWeight:700}}>
                          {t.assignee.split(' ').map(x=>x[0]).join('')}
                        </div>{t.assignee}
                      </div>}
                      {t.due&&<div style={{marginTop:6,fontSize:11,color:isOverdue(t.due)&&!t.done?'var(--red)':'var(--text3)',display:'flex',alignItems:'center',gap:4}}>
                        <Icon name="cal" size={11}/>{fmtDate(t.due)}
                      </div>}
                    </div>
                  );
                })}
                <button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center',marginTop:4}} onClick={()=>{setShowModal(true);}}>
                  <Icon name="plus" size={12}/> Add task
                </button>
              </div>
            );
          })}
        </div>
      )}
      {showModal&&<TaskModal onClose={()=>{setShowModal(false);setEditTask(null);}} onSave={handleSave} projects={projects} initial={editTask}/>}
    </div>
  );
}

/* ── Team Page ── */
function TeamPage({ projects, tasks }) {
  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:16}}>
        {MEMBERS.map(m=>{
          const myTasks = tasks.filter(t=>t.assignee===m);
          const myDone = myTasks.filter(t=>t.done).length;
          const myProjects = [...new Set(myTasks.map(t=>t.projectId))].map(id=>projects.find(p=>p.id===id)).filter(Boolean);
          const initials = m.split(' ').map(x=>x[0]).join('');
          const colors = ['linear-gradient(135deg,#6c63ff,#a78bfa)','linear-gradient(135deg,#22d3a0,#38bdf8)','linear-gradient(135deg,#f5a623,#ff5e7d)','linear-gradient(135deg,#38bdf8,#6c63ff)','linear-gradient(135deg,#a78bfa,#f472b6)','linear-gradient(135deg,#22d3a0,#6c63ff)'];
          const ci = MEMBERS.indexOf(m)%colors.length;
          return (
            <div className="card" key={m}>
              <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:16}}>
                <div style={{width:48,height:48,borderRadius:'50%',background:colors[ci],display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:700,color:'#fff',flexShrink:0}}>{initials}</div>
                <div>
                  <div style={{fontFamily:'Syne',fontWeight:700,fontSize:15}}>{m}</div>
                  <div style={{fontSize:12,color:'var(--text3)'}}>Team Member</div>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
                {[{l:'Tasks',v:myTasks.length,c:'var(--accent)'},{l:'Done',v:myDone,c:'var(--green)'},{l:'Projects',v:myProjects.length,c:'var(--blue)'}].map(s=>(
                  <div key={s.l} style={{background:'var(--bg3)',borderRadius:8,padding:'10px 8px',textAlign:'center'}}>
                    <div style={{fontFamily:'Syne',fontWeight:700,fontSize:20,color:s.c}}>{s.v}</div>
                    <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{s.l}</div>
                  </div>
                ))}
              </div>
              {myTasks.length>0&&<>
                <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>Completion</div>
                <div className="progress-bar" style={{marginBottom:12}}>
                  <div className="progress-fill" style={{width:`${Math.round(myDone/myTasks.length*100)}%`,background:colors[ci].split(',')[0].replace('linear-gradient(135deg,','')}}/>
                </div>
              </>}
              {myProjects.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                {myProjects.map(p=>(
                  <span key={p.id} style={{fontSize:10,background:p.color+'22',color:p.color,padding:'2px 7px',borderRadius:4,fontWeight:600}}>{p.emoji} {p.name}</span>
                ))}
              </div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── Analytics Page ── */
function AnalyticsPage({ projects, tasks }) {
  const byStatus = STATUSES.reduce((a,s)=>{a[s]=projects.filter(p=>p.status===s).length;return a;},{});
  const byPriority = PRIORITIES.reduce((a,p)=>{a[p]=tasks.filter(t=>t.priority===p).length;return a;},{});
  const completionByProject = projects.map(p=>({
    ...p, ptasks:tasks.filter(t=>t.projectId===p.id), done:tasks.filter(t=>t.projectId===p.id&&t.done).length
  }));
  const statusColors = {Planning:'var(--blue)',Active:'var(--green)',Review:'var(--amber)',Done:'var(--text3)','On Hold':'var(--red)'};
  const maxTasksInProj = Math.max(...completionByProject.map(p=>p.ptasks.length),1);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="card">
          <div className="section-header"><span className="section-title">Projects by Status</span></div>
          <div style={{display:'flex',flexDirection:'column',gap:12,marginTop:8}}>
            {STATUSES.map(s=>(
              <div key={s}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style={{fontSize:12,color:'var(--text2)'}}>{s}</span>
                  <span style={{fontSize:12,fontWeight:600,color:statusColors[s]}}>{byStatus[s]}</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width:`${projects.length>0?(byStatus[s]/projects.length)*100:0}%`,background:statusColors[s]}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="section-header"><span className="section-title">Tasks by Priority</span></div>
          <div style={{display:'flex',flexDirection:'column',gap:12,marginTop:8}}>
            {PRIORITIES.map(p=>{
              const c=p==='High'?'var(--red)':p==='Medium'?'var(--amber)':'var(--green)';
              return (
                <div key={p}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <span style={{fontSize:12,color:'var(--text2)'}}>{p} Priority</span>
                    <span style={{fontSize:12,fontWeight:600,color:c}}>{byPriority[p]}</span>
                  </div>
                  <div className="progress-bar">
                    <div className="progress-fill" style={{width:`${tasks.length>0?(byPriority[p]/tasks.length)*100:0}%`,background:c}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
      <div className="card">
        <div className="section-header"><span className="section-title">Task Load by Project</span></div>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginTop:8}}>
          {completionByProject.map(p=>(
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:14}}>
              <span style={{fontSize:14,flexShrink:0}}>{p.emoji}</span>
              <span style={{fontSize:12,color:'var(--text2)',width:140,flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span>
              <div style={{flex:1,position:'relative'}}>
                <div className="progress-bar" style={{margin:0}}>
                  <div style={{height:'100%',borderRadius:4,background:p.color,width:`${(p.ptasks.length/maxTasksInProj)*100}%`}}/>
                  <div style={{position:'absolute',top:0,left:0,height:'100%',borderRadius:4,background:p.color,opacity:0.3,width:`${(p.done/maxTasksInProj)*100}%`}}/>
                </div>
              </div>
              <span style={{fontSize:11,color:'var(--text3)',flexShrink:0,width:60,textAlign:'right'}}>{p.done}/{p.ptasks.length} done</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [page, setPage] = useState('dashboard');
  const [projects, setProjects] = useState(INIT_PROJECTS);
  const [tasks, setTasks] = useState(INIT_TASKS);
  const [toasts, setToasts] = useState([]);

  const addToast = useCallback((icon, msg) => {
    const id = uid();
    setToasts(t=>[...t,{id,icon,msg}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  },[]);

  const pageTitle = { dashboard:'Dashboard', projects:'Projects', tasks:'Tasks', team:'Team', analytics:'Analytics' };

  return (
    <>
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">F</div>
          <span className="logo-text">Forge</span>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-label">Main</div>
          {[
            {id:'dashboard',icon:'dashboard',label:'Dashboard'},
            {id:'projects',icon:'folder',label:'Projects',badge:projects.filter(p=>p.status==='Active').length},
            {id:'tasks',icon:'tasks',label:'Tasks',badge:tasks.filter(t=>!t.done&&isOverdue(t.due)).length||0},
          ].map(n=>(
            <button key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              <span className="nav-icon"><Icon name={n.icon} size={15}/></span>
              {n.label}
              {n.badge>0&&<span className="nav-badge">{n.badge}</span>}
            </button>
          ))}
          <div className="nav-label">Insights</div>
          {[
            {id:'team',icon:'team',label:'Team'},
            {id:'analytics',icon:'chart',label:'Analytics'},
          ].map(n=>(
            <button key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              <span className="nav-icon"><Icon name={n.icon} size={15}/></span>
              {n.label}
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="user-card">
            <div className="avatar">YO</div>
            <div className="user-info">
              <div className="user-name">Your Account</div>
              <div className="user-role">Admin</div>
            </div>
          </div>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <div className="topbar-left">
            <span className="page-title">{pageTitle[page]}</span>
          </div>
          <div className="topbar-right">
            <button className="btn-icon"><Icon name="bell" size={15}/></button>
            <button className="btn-icon"><Icon name="settings" size={15}/></button>
          </div>
        </div>
        <div className="content">
          {page==='dashboard'&&<DashboardPage projects={projects} tasks={tasks} addToast={addToast}/>}
          {page==='projects'&&<ProjectsPage projects={projects} tasks={tasks}
            onAddProject={p=>setProjects(ps=>[...ps,p])}
            onEditProject={p=>setProjects(ps=>ps.map(x=>x.id===p.id?p:x))}
            onDeleteProject={id=>{setProjects(ps=>ps.filter(p=>p.id!==id));setTasks(ts=>ts.filter(t=>t.projectId!==id));}}
            addToast={addToast}/>}
          {page==='tasks'&&<TasksPage projects={projects} tasks={tasks}
            onAddTask={t=>setTasks(ts=>[...ts,t])}
            onEditTask={t=>setTasks(ts=>ts.map(x=>x.id===t.id?t:x))}
            onDeleteTask={id=>setTasks(ts=>ts.filter(t=>t.id!==id))}
            onToggleTask={id=>setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done,status:t.done?'In Progress':'Done'}:t))}
            addToast={addToast}/>}
          {page==='team'&&<TeamPage projects={projects} tasks={tasks}/>}
          {page==='analytics'&&<AnalyticsPage projects={projects} tasks={tasks}/>}
        </div>
      </div>
      <Toast toasts={toasts}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
